services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:darkcrane123@db:5432/darkcrane_store?schema=public
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=darkcrane123
      - POSTGRES_DB=darkcrane_store
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d darkcrane_store"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
